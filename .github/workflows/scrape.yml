name: Scrape Physio Availability

on:
  schedule:
    # Run every day at 06:00 UTC (07:00 BST / 06:00 GMT)
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py --workers 8

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sites.json
          git diff --staged --quiet || git commit -m "chore: refresh physio availability data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
